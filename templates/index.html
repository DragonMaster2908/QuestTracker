<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Board</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Unified Desktop Theme Colors */
        :root {
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --primary: #8b5cf6; 
            --success: #10b981; 
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        /* Fully Functional Light Mode */
        body.light-mode {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #6d28d9;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --text: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        #app { max-width: 800px; margin: 0 auto; }

        .task-item {
            background: var(--card-bg);
            margin: 12px 0;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .task-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 15px; }
        
        .task-name { 
            font-weight: 600; 
            font-size: 1.1rem; 
            word-wrap: break-word; 
            overflow-wrap: break-word;
        }

        .tags {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            flex-wrap: wrap; 
            gap: 15px;
            align-items: center;
        }

        .forge-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        .input-label { font-size: 11px; font-weight: bold; color: var(--primary); text-transform: uppercase; }

        input, select {
            background: var(--bg);
            border: 1px solid var(--border-color);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-size: 16px; 
            outline: none;
        }
        
        input:focus, select:focus { border-color: var(--primary); }

        .notif-banner {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--primary);
        }

        #toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 10000;
        }

        .tab-btn { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            background: var(--card-bg); 
            color: var(--text-muted); 
            cursor: pointer; 
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Edit Option (Kebab) CSS restored */
        .kebab-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 0 10px; }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 30px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1000; min-width: 120px; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { padding: 12px 20px; cursor: pointer; color: var(--text); font-size: 0.9rem; }
        .dropdown-item:hover { background: var(--bg); }
        .dropdown-item.danger { color: var(--danger); }
        
        /* Filter Bar */
        .filter-bar {
            display: flex; 
            justify-content: space-between; 
            background: var(--card-bg); 
            padding: 10px 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="authScreen" style="display: none; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <h2 style="color: var(--text);">Quest Board</h2>
        <div style="background: var(--card-bg); padding: 30px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; width: 300px; border: 1px solid var(--border-color);">
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Password">
            <button onclick="handleAuth('/api/auth/login')" style="background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">Log In</button>
            <button onclick="handleAuth('/api/auth/signup')" style="background: none; border: 1px solid var(--border-color); color: var(--text); padding: 12px; border-radius: 8px; cursor: pointer;">Sign Up</button>
            <p id="authError" style="color: var(--danger); display: none; font-size: 0.8rem; text-align: center;"></p>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <div id="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="userNameDisplay" style="margin: 0;">Welcome</h2>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button onclick="requestNotificationPermission()" id="notifBtn" style="background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer;">
                    <i class="fa-regular fa-bell"></i>
                </button>
                <button id="themeToggle" onclick="toggleTheme()" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">🌙</button>
                <button onclick="logout()" style="background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer;">Log Out</button>
            </div>
        </div>

        <div id="notifBanner" class="notif-banner" style="display: none;">
            <span>Enable mobile alerts for quests?</span>
            <button onclick="requestNotificationPermission()" style="background: var(--primary); border: none; color: white; padding: 5px 15px; border-radius: 4px; font-weight: bold;">Enable</button>
        </div>

        <div style="background: var(--card-bg); padding: 20px; border-radius: 12px; display: flex; gap: 20px; align-items: center; margin-bottom: 20px; border: 1px solid var(--border-color);">
            <div style="background: var(--bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);">
                <canvas id="avatarCanvas" width="80" height="80" style="image-rendering: pixelated;"></canvas>
            </div>
            <div style="flex: 1;">
                <div style="font-weight: bold; margin-bottom: 8px; color: var(--primary); display: flex; justify-content: space-between;">
                    <span id="heroName">Hero</span>
                    <span id="levelText"></span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--danger); font-weight: bold; margin-bottom: 2px;">
                    <span>HP</span> <span id="hpText"></span>
                </div>
                <div style="background: var(--bg); height: 10px; border-radius: 5px; margin-bottom: 12px; overflow: hidden; border: 1px solid var(--border-color);">
                    <div id="hpBar" style="background: var(--danger); height: 100%; width: 0%;"></div>
                </div>
                
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--success); font-weight: bold; margin-bottom: 2px;">
                    <span>XP</span> <span id="xpText"></span>
                </div>
                <div style="background: var(--bg); height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid var(--border-color);">
                    <div id="xpBar" style="background: var(--success); height: 100%; width: 0%;"></div>
                </div>
            </div>
        </div>

        <div class="tabs" style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="tab-btn active" onclick="switchTab('daily')">Daily</button>
            <button class="tab-btn" onclick="switchTab('weekly')">Weekly</button>
            <button class="tab-btn" onclick="switchTab('todo')">To-Do</button>
        </div>

        <!-- The Forge -->
        <div style="background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color);">
            <input type="text" id="newTaskName" placeholder="Enter new quest..." style="width: 100%; box-sizing: border-box; margin-bottom: 15px;">
            
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <input type="time" id="newTime" style="flex: 1; min-width: 120px;">
                <input type="date" id="newDate" style="display: none; flex: 1; min-width: 150px;">
                <select id="newDifficulty" style="flex: 1; min-width: 120px;">
                    <option>Trivial</option><option>Easy</option><option selected>Medium</option><option>Hard</option><option>Epic</option>
                </select>
                <button id="forgeBtn" onclick="addTask()" style="background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">Forge</button>
            </div>
            
            <div id="weeklyDaysContainer" style="display: none; gap: 10px; margin-top: 15px; flex-wrap: wrap; color: var(--text-muted); font-size: 0.9rem;">
                <label><input type="checkbox" class="day-cb" value="Mon"> Mon</label>
                <label><input type="checkbox" class="day-cb" value="Tue"> Tue</label>
                <label><input type="checkbox" class="day-cb" value="Wed"> Wed</label>
                <label><input type="checkbox" class="day-cb" value="Thu"> Thu</label>
                <label><input type="checkbox" class="day-cb" value="Fri"> Fri</label>
                <label><input type="checkbox" class="day-cb" value="Sat"> Sat</label>
                <label><input type="checkbox" class="day-cb" value="Sun"> Sun</label>
            </div>
        </div>

        <!-- Filter Bar Separated from Tabs -->
        <div class="filter-bar">
            <div>
                <span style="color: var(--text-muted); font-size: 0.9rem; margin-right: 5px;">View:</span>
                <select id="taskFilter" onchange="renderTasks()" style="background: transparent; border: none; color: var(--text); padding: 0;">
                    <option value="all">All Quests</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div>
                <span style="color: var(--text-muted); font-size: 0.9rem; margin-right: 5px;">Sort:</span>
                <select id="taskSort" onchange="renderTasks()" style="background: transparent; border: none; color: var(--text); padding: 0;">
                    <option value="time">By Time</option>
                    <option value="difficulty">By Rank</option>
                </select>
            </div>
        </div>

        <div id="taskList"></div>
    </div>
</div>

<div id="toast"><span id="toastMsg"></span></div>

<script>
    const VAPID_PUBLIC_KEY = "BOc_goJ2q_CCxYFbAwyJFkJJvYUgGRlvnLuN7-TXGrvArtU5zoX2howB34LGJMS2UvMwFP9GltN9EMlkbBWRukU";
    let appData = {};
    let currentTab = 'daily';
    let currentEmail = localStorage.getItem('qb_email');
    let editingTaskName = null;

    // 1. Force PWA Update
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                reg.update(); // Forces the browser to check for new notification logic
            });
        });
    }

    function showStatus(msg, isError = false) {
        const toast = document.getElementById('toast');
        const msgEl = document.getElementById('toastMsg');
        msgEl.style.color = isError ? 'var(--danger)' : 'var(--success)';
        msgEl.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // --- FULL PIXEL ART MATRIX ---
    function drawAvatar(level) {
        const canvas = document.getElementById('avatarCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 80, 80);
        
        const x = null, k = "#1e293b", h = "#3E2723", s = "#FFCC80", w = "#FFFFFF", p = "#0D47A1", c = "#06b6d4", b = "#3b82f6", d = "#475569"; 
        let matrix = [
            [x,x,x,x,x,x,x,x,x,x,x,x,x,x,x,x],
            [x,x,x,x,x,k,k,k,k,k,k,x,x,x,x,x],
            [x,x,x,x,k,h,h,h,h,h,h,k,x,x,x,x],
            [x,x,x,k,h,h,h,h,h,h,h,h,k,x,x,x],
            [x,x,x,k,h,k,w,p,s,w,p,k,h,k,x,x],
            [x,x,x,k,h,s,s,s,s,s,s,h,k,x,x,x],
            [x,x,x,x,k,s,s,s,s,s,s,k,x,x,x,x],
            [x,x,x,x,x,k,k,k,k,k,k,x,x,x,x,x],
            [x,x,x,x,k,c,c,c,c,c,c,k,x,x,x,x],
            [x,x,x,k,s,k,c,c,c,c,k,s,k,x,x,x],
            [x,x,x,k,s,k,c,c,c,c,k,s,k,x,x,x],
            [x,x,x,k,s,k,b,b,b,b,k,s,k,x,x,x],
            [x,x,x,x,k,k,b,b,b,b,k,k,x,x,x,x],
            [x,x,x,x,k,b,b,k,k,b,b,k,x,x,x,x],
            [x,x,x,x,k,b,b,k,k,b,b,k,x,x,x,x],
            [x,x,x,x,k,d,d,k,k,d,d,k,x,x,x,x] 
        ];

        if (level >= 2) { const a = "#94a3b8"; for(let r=8; r<=11; r++) for(let col=5; col<=10; col++) matrix[r][col] = a; }
        if (level >= 3) {
            const blade = "#e2e8f0", hilt = "#fbbf24", handle = "#78350f";
            matrix[4][1]=k; matrix[4][2]=k; matrix[5][1]=k; matrix[5][2]=blade; matrix[5][3]=k;
            matrix[6][1]=k; matrix[6][2]=blade; matrix[6][3]=k; matrix[7][1]=k; matrix[7][2]=blade; matrix[7][3]=k;
            matrix[8][0]=k; matrix[8][1]=hilt; matrix[8][2]=hilt; matrix[8][3]=hilt; matrix[8][4]=k;
            matrix[9][1]=k; matrix[9][2]=handle; matrix[9][3]=k; matrix[10][1]=k; matrix[10][2]=k; matrix[10][3]=k;
        }
        if (level >= 4) { const g = "#fbbf24"; for(let r=8; r<=11; r++) for(let col=5; col<=10; col++) matrix[r][col] = g; }
        if (level >= 5) {
            const g = "#fbbf24", r = "#e11d48";
            matrix[0][5]=k; matrix[0][7]=k; matrix[0][9]=k; 
            matrix[1][4]=k; matrix[1][5]=g; matrix[1][6]=k; matrix[1][7]=g; matrix[1][8]=k; matrix[1][9]=g; matrix[1][10]=k;
            matrix[2][4]=k; matrix[2][5]=g; matrix[2][6]=g; matrix[2][7]=r; matrix[2][8]=g; matrix[2][9]=g; matrix[2][10]=k;
        }

        for(let row=0; row<16; row++) {
            for(let col=0; col<16; col++) {
                if (matrix[row][col]) {
                    ctx.fillStyle = matrix[row][col];
                    ctx.fillRect((col * 3) + 16, (row * 3) + 16, 3, 3);
                }
            }
        }
    }

    // --- NOTIFICATIONS ---
    function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) { outputArray[i] = rawData.charCodeAt(i); }
        return outputArray;
    }

    async function requestNotificationPermission() {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            const registration = await navigator.serviceWorker.ready;
            const existing = await registration.pushManager.getSubscription();
            if (existing) await existing.unsubscribe();

            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
            });

            const response = await fetch('/api/save-subscription', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('qb_token')}` },
                body: JSON.stringify(subscription)
            });

            if (response.ok) {
                showStatus("Alerts synced!");
                document.getElementById('notifBanner').style.display = 'none';
                document.getElementById('notifBtn').style.color = 'var(--primary)';
            }
        }
    }

    // --- ENGINE ---
    function getHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('qb_token')}` };
    }

    async function fetchApp() {
        const response = await fetch('/api/data', { headers: getHeaders() });
        if (response.status === 401) return logout();
        appData = await response.json();
        updateDashboard();
        renderTasks();
    }

    function updateDashboard() {
        const p = appData.player;
        const max_xp = Math.floor(100 * Math.pow(1.10, p.level - 1));
        document.getElementById('levelText').innerText = `(Lvl ${p.level})`;
        document.getElementById('hpText').innerText = `${p.hp} / ${p.max_hp}`;
        document.getElementById('xpText').innerText = `${p.current_xp} / ${max_xp}`;
        document.getElementById('hpBar').style.width = `${(p.hp / p.max_hp) * 100}%`;
        document.getElementById('xpBar').style.width = `${(p.current_xp / max_xp) * 100}%`;
        drawAvatar(p.level);
    }

    function toggleMenu(index, event) {
        document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('show'));
        document.getElementById(`menu-${index}`).classList.toggle('show');
        event.stopPropagation();
    }
    document.addEventListener('click', () => document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show')));

    function renderTasks() {
        const container = document.getElementById('taskList');
        container.innerHTML = '';
        let tasksData = appData[currentTab] || {};
        const filter = document.getElementById('taskFilter').value;
        const sortValue = document.getElementById('taskSort').value;

        let tasksArray = Object.entries(tasksData).map(([name, details]) => ({ name, details }));
        if (filter === 'pending') tasksArray = tasksArray.filter(t => t.details.state !== 1);
        else if (filter === 'completed') tasksArray = tasksArray.filter(t => t.details.state === 1);

        const diffWeight = { "Trivial": 1, "Easy": 2, "Medium": 3, "Hard": 4, "Epic": 5 };
        tasksArray.sort((a, b) => {
            if (sortValue === 'difficulty') return diffWeight[b.details.difficulty || 'Medium'] - diffWeight[a.details.difficulty || 'Medium'];
            return (a.details.target_time || '23:59').localeCompare(b.details.target_time || '23:59');
        });

        tasksArray.forEach((task, index) => {
            const { name, details } = task;
            const div = document.createElement('div');
            div.className = 'task-item' + (details.state === 1 ? ' completed' : '');
            
            let tagsHTML = `<span style="color: var(--text-muted);">[${details.difficulty}]</span>`;
            if (details.target_time) tagsHTML += `<span><i class="fa-regular fa-clock"></i> ${details.target_time}</span>`;
            if (details.target_date) tagsHTML += `<span><i class="fa-regular fa-calendar"></i> ${details.target_date}</span>`;
            if (currentTab === 'weekly' && details.days) tagsHTML += `<span><i class="fa-solid fa-repeat"></i> ${details.days.join(', ')}</span>`;

            // Escape quotes for JS calls
            const safeName = name.replace(/'/g, "\\'"); 

            div.innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px;">
                    <input type="checkbox" ${details.state === 1 ? 'checked' : ''} 
                           onchange="toggleTask('${currentTab}', '${safeName}', this.checked)" 
                           style="width: 22px; height: 22px; accent-color: var(--success); cursor: pointer;">
                </div>
                <div class="task-info" style="${details.state === 1 ? 'opacity: 0.5; text-decoration: line-through;' : ''}">
                    <span class="task-name" style="margin-right: 15px;">${name}</span>
                    <div class="tags">${tagsHTML}</div>
                </div>
                <div class="task-actions" style="position: relative;">
                    <button class="kebab-btn" onclick="toggleMenu(${index}, event)">⋮</button>
                    <div id="menu-${index}" class="dropdown-menu">
                        <div class="dropdown-item" onclick="triggerEdit('${currentTab}', '${safeName}')">Edit Task</div>
                        <div class="dropdown-item danger" onclick="deleteTask('${currentTab}', '${safeName}')">Delete Task</div>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function toggleTask(category, name, isChecked) {
        await fetch('/api/task/toggle', {
            method: 'POST', headers: getHeaders(),
            body: JSON.stringify({ category, task_name: name, state: isChecked ? 1 : 0 })
        });
        fetchApp();
    }

    async function addTask() {
        const nameInput = document.getElementById('newTaskName');
        const name = nameInput.value.trim();
        if (!name) return alert("Quest name required!");
        
        const payload = {
            category: currentTab,
            difficulty: document.getElementById('newDifficulty').value,
            target_time: document.getElementById('newTime').value || null
        };
        
        if (currentTab === 'todo') payload.target_date = document.getElementById('newDate').value;
        if (currentTab === 'weekly') {
            payload.days = Array.from(document.querySelectorAll('.day-cb:checked')).map(cb => cb.value);
        }

        const endpoint = editingTaskName ? '/api/task/edit' : '/api/task/add';
        if (editingTaskName) { payload.old_name = editingTaskName; payload.new_name = name; } 
        else { payload.task_name = name; }

        const res = await fetch(endpoint, { method: 'POST', headers: getHeaders(), body: JSON.stringify(payload) });
        if (res.ok) {
            nameInput.value = '';
            document.getElementById('newTime').value = '';
            document.getElementById('newDate').value = '';
            document.querySelectorAll('.day-cb').forEach(cb => cb.checked = false);
            editingTaskName = null;
            
            const btn = document.getElementById('forgeBtn');
            btn.innerText = "Forge"; btn.style.background = "var(--success)";
            
            fetchApp();
            showStatus("Quest Forged!");
        }
    }

    function triggerEdit(category, taskName) {
        editingTaskName = taskName;
        const details = appData[category][taskName];
        document.getElementById('newTaskName').value = taskName;
        document.getElementById('newDifficulty').value = details.difficulty || 'Medium';
        document.getElementById('newTime').value = details.target_time || '';
        document.getElementById('newDate').value = details.target_date || '';
        document.querySelectorAll('.day-cb').forEach(cb => cb.checked = (details.days && details.days.includes(cb.value)));
        
        const forgeBtn = document.getElementById('forgeBtn');
        forgeBtn.innerText = "Save Edit"; forgeBtn.style.background = "var(--warning)";
        window.scrollTo(0, 0); 
    }

    async function deleteTask(category, name) {
        if (!confirm("Abandon this quest?")) return;
        await fetch('/api/task/delete', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ category, task_name: name }) });
        fetchApp();
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('weeklyDaysContainer').style.display = tab === 'weekly' ? 'flex' : 'none';
        document.getElementById('newDate').style.display = tab === 'todo' ? 'block' : 'none';
        renderTasks();
    }

    // --- AUTH & THEME ---
    function checkAuth() {
        if (currentEmail) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            let name = currentEmail.split('@')[0];
            let capitalizedName = name.charAt(0).toUpperCase() + name.slice(1);
            document.getElementById('userNameDisplay').innerText = "Quest Board";
            document.getElementById('heroName').innerText = capitalizedName;
            
            fetchApp();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    }

    async function handleAuth(endpoint) {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        const res = await fetch(endpoint, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
            if (endpoint.includes('login')) {
                localStorage.setItem('qb_email', email);
                localStorage.setItem('qb_token', data.token);
                currentEmail = email;
                checkAuth();
            } else { alert("Account created! Log in now."); }
        } else {
            const err = document.getElementById('authError');
            err.innerText = data.message; err.style.display = 'block';
        }
    }

    function logout() { localStorage.clear(); currentEmail = null; checkAuth(); }

    function toggleTheme() {
        const body = document.body;
        const isLight = body.classList.toggle('light-mode');
        localStorage.setItem('qb_theme', isLight ? 'light' : 'dark');
        document.getElementById('themeToggle').innerText = isLight ? '🌙' : '☀️';
    }

    if (localStorage.getItem('qb_theme') === 'light') {
        document.body.classList.add('light-mode');
        document.getElementById('themeToggle').innerText = '🌙';
    }

    checkAuth();
</script>
</body>
</html>
