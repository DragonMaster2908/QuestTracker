<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ojas Quest Board</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#bb86fc">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #bb86fc; --bg: #121212; --card-bg: #1e1e1e;
            --text: #e1e1e1; --danger: #cf6679; --success: #03dac6; --warning: #f1c40f;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 15px; overflow-x: hidden;
        }

        #app { max-width: 600px; margin: 0 auto; }

        /* --- RPG Dashboard --- */
        .dashboard {
            background: var(--card-bg); padding: 15px; border-radius: 15px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .stats { flex: 1; }
        .bar-container { background: #333; height: 10px; border-radius: 5px; margin: 5px 0; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        #hpFill { background: var(--danger); }
        #xpFill { background: var(--primary); }

        /* --- The Forge (Input Area) --- */
        .forge-panel {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            margin-bottom: 20px; border: 1px solid #333;
        }
        .forge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .forge-group { display: flex; flex-direction: column; gap: 4px; }
        .input-label { font-size: 10px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        input, select {
            background: #2c2c2c; border: 1px solid #444; color: white;
            padding: 10px; border-radius: 8px; font-size: 16px;
        }

        /* --- Tabs & Filters --- */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn {
            padding: 8px 16px; border-radius: 20px; background: #252525;
            border: none; color: var(--text); white-space: nowrap; cursor: pointer;
        }
        .tab-btn.active { background: var(--primary); color: black; font-weight: bold; }

        /* --- Task Items (Mobile Fixes) --- */
        .task-item {
            background: var(--card-bg); margin-bottom: 12px; padding: 16px;
            border-radius: 12px; border-left: 4px solid var(--primary);
            display: flex; flex-direction: column; gap: 10px;
        }
        @media (min-width: 480px) {
            .task-item { flex-direction: row; align-items: center; justify-content: space-between; }
        }
        .task-info { flex: 1; min-width: 0; }
        .task-name { font-weight: 600; font-size: 1.1rem; word-wrap: break-word; }
        .tags {
            font-size: 0.85rem; color: var(--primary); display: flex;
            flex-wrap: wrap; gap: 8px; margin-top: 4px;
        }
        .completed { opacity: 0.5; border-left-color: var(--success); }
        .completed .task-name { text-decoration: line-through; }

        /* --- Utility --- */
        #toast {
            display: none; position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: #333; padding: 12px 24px;
            border-radius: 50px; z-index: 10000; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .auth-screen {
            display: flex; flex-direction: column; gap: 15px; height: 80vh;
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen" style="display: none;">
        <h2>Quest Board Login</h2>
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPassword" placeholder="Password">
        <div style="display: flex; gap: 10px;">
            <button onclick="handleAuth('/api/auth/login')" style="background: var(--primary); padding: 10px 20px; border-radius: 8px; border: none;">Login</button>
            <button onclick="handleAuth('/api/auth/signup')" style="background: none; border: 1px solid var(--primary); color: var(--primary); padding: 10px 20px; border-radius: 8px;">Sign Up</button>
        </div>
        <p id="authError" style="color: var(--danger); display: none;"></p>
    </div>

    <!-- Main App -->
    <div id="mainApp" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div>
                <span id="userNameDisplay" style="font-size: 1.5rem; font-weight: bold;">Ojas</span>
                <span id="levelText" style="color: var(--primary); font-size: 0.9rem;"></span>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <i class="fa-regular fa-bell" id="notifBtn" onclick="requestNotificationPermission()" style="cursor: pointer;"></i>
                <i class="fa-solid fa-arrow-right-from-bracket" onclick="logout()" style="cursor: pointer; opacity: 0.7;"></i>
            </div>
        </header>

        <!-- Player Dashboard -->
        <div class="dashboard">
            <canvas id="avatarCanvas" width="80" height="80" style="image-rendering: pixelated;"></canvas>
            <div class="stats">
                <div class="input-label">Health (HP)</div>
                <div class="bar-container"><div id="hpFill" class="bar-fill"></div></div>
                <div class="input-label">Experience (XP)</div>
                <div class="bar-container"><div id="xpFill" class="bar-fill"></div></div>
                <div style="font-size: 10px; display: flex; justify-content: space-between; margin-top: 2px;">
                    <span id="hpText">100/100</span>
                    <span id="xpText">0/100</span>
                </div>
            </div>
        </div>

        <!-- The Forge (Add/Edit Task) -->
        <div class="forge-panel">
            <input type="text" id="newTaskName" placeholder="Enter quest name..." style="width: 100%; box-sizing: border-box;">
            <div class="forge-grid">
                <div class="forge-group">
                    <label class="input-label">Difficulty</label>
                    <select id="newDifficulty">
                        <option>Trivial</option><option>Easy</option><option selected>Medium</option><option>Hard</option><option>Epic</option>
                    </select>
                </div>
                <div class="forge-group">
                    <label class="input-label">Target Time</label>
                    <input type="time" id="newTime">
                </div>
                <div class="forge-group" id="todoDateGroup" style="display: none;">
                    <label class="input-label">Due Date</label>
                    <input type="date" id="newDate">
                </div>
            </div>
            
            <!-- Weekly Days Selector -->
            <div id="weeklyDaysContainer" style="display: none; flex-wrap: wrap; gap: 5px; margin-top: 10px;">
                <label class="input-label" style="width: 100%;">Repeat on:</label>
                <label><input type="checkbox" class="day-cb" value="Mon"> M</label>
                <label><input type="checkbox" class="day-cb" value="Tue"> T</label>
                <label><input type="checkbox" class="day-cb" value="Wed"> W</label>
                <label><input type="checkbox" class="day-cb" value="Thu"> T</label>
                <label><input type="checkbox" class="day-cb" value="Fri"> F</label>
                <label><input type="checkbox" class="day-cb" value="Sat"> S</label>
                <label><input type="checkbox" class="day-cb" value="Sun"> S</label>
            </div>

            <button id="forgeBtn" onclick="addTask()" style="width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; border: none; background: var(--success); color: black; font-weight: bold; cursor: pointer;">FORGE QUEST</button>
        </div>

        <!-- View Controls -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('daily')">Dailies</button>
            <button class="tab-btn" onclick="switchTab('weekly')">Weeklies</button>
            <button class="tab-btn" onclick="switchTab('todo')">To-Do</button>
        </div>

        <!-- Task List -->
        <div id="taskList"></div>
    </div>
</div>

<div id="toast"><span id="toastMsg"></span></div>

<script>
    const VAPID_PUBLIC_KEY = "BOc_goJ2q_CCxYFbAwyJFkJJvYUgGRlvnLuN7-TXGrvArtU5zoX2howB34LGJMS2UvMwFP9GltN9EMlkbBWRukU";
    let appData = {};
    let currentTab = 'daily';
    let editingTaskName = null;

    // --- PWA & SW ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js');
        });
    }

    // --- Auth Logic ---
    async function handleAuth(endpoint) {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        const res = await fetch(endpoint, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('qb_token', data.token);
            localStorage.setItem('qb_email', email);
            checkAuth();
        } else {
            const err = document.getElementById('authError');
            err.innerText = data.message || "Auth failed"; err.style.display = 'block';
        }
    }

    function checkAuth() {
        const token = localStorage.getItem('qb_token');
        if (token) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            fetchApp();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    }

    function logout() { localStorage.clear(); location.reload(); }

    // --- Game & Task Engine ---
    async function fetchApp() {
        const res = await fetch('/api/data', {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('qb_token')}` }
        });
        if (res.status === 401) logout();
        appData = await res.json();
        updateDashboard();
        renderTasks();
    }

    function updateDashboard() {
        const p = appData.player;
        const max_xp = Math.floor(100 * Math.pow(1.10, p.level - 1));
        document.getElementById('levelText').innerText = ` (Lvl ${p.level})`;
        document.getElementById('hpText').innerText = `${p.hp}/${p.max_hp}`;
        document.getElementById('xpText').innerText = `${p.current_xp}/${max_xp}`;
        document.getElementById('hpFill').style.width = `${(p.hp / p.max_hp) * 100}%`;
        document.getElementById('xpFill').style.width = `${(p.current_xp / max_xp) * 100}%`;
        drawAvatar(p.level);
    }

    function renderTasks() {
        const container = document.getElementById('taskList');
        container.innerHTML = '';
        const tasks = appData[currentTab] || {};
        
        Object.entries(tasks).forEach(([name, details]) => {
            const div = document.createElement('div');
            div.className = `task-item ${details.state === 1 ? 'completed' : ''}`;
            
            let timeTag = details.target_time ? `<span><i class="fa-regular fa-clock"></i> ${details.target_time}</span>` : '';
            let dateTag = details.target_date ? `<span><i class="fa-regular fa-calendar"></i> ${details.target_date}</span>` : '';
            let daysTag = (currentTab === 'weekly' && details.days) ? `<span><i class="fa-solid fa-repeat"></i> ${details.days.join(', ')}</span>` : '';

            div.innerHTML = `
                <div class="task-info">
                    <div class="task-name">${name}</div>
                    <div class="tags">
                        <span><i class="fa-solid fa-bolt"></i> ${details.difficulty}</span>
                        ${timeTag} ${dateTag} ${daysTag}
                    </div>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <i class="fa-solid fa-trash" style="color: var(--danger); opacity: 0.5;" onclick="deleteTask('${name}')"></i>
                    <i class="fa-solid ${details.state === 1 ? 'fa-circle-check' : 'fa-circle'}" 
                       style="font-size: 1.8rem; color: ${details.state === 1 ? 'var(--success)' : '#444'}" 
                       onclick="toggleTask('${name}', ${details.state === 1 ? 0 : 1})"></i>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function toggleTask(name, state) {
        await fetch('/api/task/toggle', {
            method: 'POST', headers: getHeaders(),
            body: JSON.stringify({ category: currentTab, task_name: name, state: state })
        });
        fetchApp();
    }

    async function addTask() {
        const name = document.getElementById('newTaskName').value;
        if(!name) return showStatus("Quest name required", true);
        
        const payload = {
            category: currentTab, task_name: name,
            difficulty: document.getElementById('newDifficulty').value,
            target_time: document.getElementById('newTime').value || null
        };

        if (currentTab === 'weekly') {
            payload.days = Array.from(document.querySelectorAll('.day-cb:checked')).map(cb => cb.value);
        }
        if (currentTab === 'todo') {
            payload.target_date = document.getElementById('newDate').value || null;
        }

        const res = await fetch('/api/task/add', {
            method: 'POST', headers: getHeaders(), body: JSON.stringify(payload)
        });
        if (res.ok) {
            document.getElementById('newTaskName').value = '';
            fetchApp();
            showStatus("Quest Forged!");
        }
    }

    async function deleteTask(name) {
        if (!confirm("Delete this quest?")) return;
        await fetch('/api/task/delete', {
            method: 'POST', headers: getHeaders(),
            body: JSON.stringify({ category: currentTab, task_name: name })
        });
        fetchApp();
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('weeklyDaysContainer').style.display = tab === 'weekly' ? 'flex' : 'none';
        document.getElementById('todoDateGroup').style.display = tab === 'todo' ? 'flex' : 'none';
        renderTasks();
    }

    // --- Notification Handshake ---
    async function requestNotificationPermission() {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            const registration = await navigator.serviceWorker.ready;
            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
            });
            await fetch('/api/save-subscription', {
                method: 'POST', headers: getHeaders(), body: JSON.stringify(subscription)
            });
            showStatus("Alerts Enabled!");
            document.getElementById('notifBtn').style.color = 'var(--success)';
        }
    }

    // --- Helpers ---
    function getHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('qb_token')}` };
    }

    function showStatus(msg, isErr = false) {
        const t = document.getElementById('toast');
        const m = document.getElementById('toastMsg');
        m.innerText = msg; m.style.color = isErr ? 'var(--danger)' : 'var(--success)';
        t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
    }

    function urlBase64ToUint8Array(b64) {
        const pad = '='.repeat((4 - b64.length % 4) % 4);
        const base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
        const raw = window.atob(base64);
        const out = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; ++i) out[i] = raw.charCodeAt(i);
        return out;
    }

    function drawAvatar(level) {
        const canvas = document.getElementById('avatarCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,80,80);
        const k="#1e293b", s="#FFCC80", b="#3b82f6", c="#06b6d4";
        ctx.fillStyle = k; ctx.fillRect(20,20,40,40); // Body
        ctx.fillStyle = s; ctx.fillRect(25,15,30,30); // Face
        ctx.fillStyle = b; ctx.fillRect(20,50,40,20); // Legs
        if(level >= 2) { ctx.fillStyle = c; ctx.fillRect(20,40,40,10); } // Armor
    }

    window.onload = checkAuth;
</script>
</body>
</html>
